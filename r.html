<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join FlashQuest</title>
<meta name="theme-color" content="#08071A">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta property="og:title" content="Join FlashQuest">
<meta property="og:description" content="Someone invited you to FlashQuest! Use their code and you both unlock exclusive avatar colors.">
<meta property="og:url" content="https://flashquest.net/r.html">
<meta property="og:type" content="website">
<meta property="og:image" content="https://flashquest.net/images/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Join FlashQuest">
<meta name="twitter:description" content="Someone invited you to FlashQuest! Use their code and you both unlock exclusive avatar colors.">
<meta name="twitter:image" content="https://flashquest.net/images/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'DM Sans',-apple-system,sans-serif;
  background:#08071A;color:#EEEDF5;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;text-align:center;
  -webkit-font-smoothing:antialiased;
  position:relative;overflow:hidden;
}
h1,h2,h3{font-family:'Outfit',sans-serif;letter-spacing:-.02em}
body::before{
  content:'';position:absolute;top:-150px;left:50%;transform:translateX(-50%);
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,#8B5CF615,transparent 70%);
  pointer-events:none;
}
.card{
  max-width:420px;width:100%;
  background:rgba(20,19,46,.7);border:1px solid #2A2850;
  border-radius:28px;padding:48px 36px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  position:relative;z-index:1;
}
.emoji{font-size:52px;margin-bottom:16px}
.title{font-size:26px;font-weight:800;margin-bottom:8px;color:#fff}
.subtitle{font-size:15px;color:rgba(255,255,255,.65);line-height:1.5;margin-bottom:28px}
.code-box{
  display:flex;align-items:center;justify-content:center;gap:12px;
  background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);
  border-radius:14px;padding:14px 20px;margin-bottom:24px;
}
.code-label{font-size:12px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.code-value{font-family:'Outfit',monospace;font-size:22px;font-weight:700;color:#A78BFA;letter-spacing:.02em}
.copy-btn{
  background:rgba(139,92,246,.2);border:1px solid rgba(139,92,246,.3);
  color:#A78BFA;border-radius:10px;padding:8px 14px;
  font-size:13px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .15s;
}
.copy-btn:hover{background:rgba(139,92,246,.3)}
.copy-btn.copied{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.3);color:#34D399}
.colors-row{
  display:flex;justify-content:center;gap:8px;margin-bottom:28px;flex-wrap:wrap;
}
.color-dot{width:28px;height:28px;border-radius:8px;border:1px solid rgba(255,255,255,.12)}
.download-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:16px;border-radius:16px;
  background:#7C3AED;color:#fff;font-weight:700;font-size:16px;
  text-decoration:none;margin-bottom:12px;
  font-family:'DM Sans',sans-serif;transition:all .15s;
}
.download-btn:hover{background:#6D28D9}
.open-btn{
  display:flex;align-items:center;justify-content:center;
  width:100%;padding:14px;border-radius:14px;
  background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2);
  color:#A78BFA;font-weight:600;font-size:15px;
  text-decoration:none;margin-bottom:20px;
  font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;
}
.open-btn:hover{background:rgba(139,92,246,.18)}
.hint{font-size:13px;color:rgba(255,255,255,.35);line-height:1.5}
.hint strong{color:rgba(255,255,255,.55);font-weight:600}
</style>
</head>
<body>

<div class="card">
  <div class="emoji">🎉</div>
  <h1 class="title" id="title">You've been invited!</h1>
  <p class="subtitle" id="subtitle">Join FlashQuest and you both unlock 6 exclusive avatar colors.</p>

  <div class="code-label">Referral code</div>
  <div class="code-box">
    <span class="code-value" id="codeDisplay">...</span>
    <button class="copy-btn" id="copyBtn" onclick="copyCode()">Copy</button>
  </div>

  <div class="colors-row">
    <div class="color-dot" style="background:#8B5CF6"></div>
    <div class="color-dot" style="background:#14B8A6"></div>
    <div class="color-dot" style="background:#EC4899"></div>
    <div class="color-dot" style="background:#EAB308"></div>
    <div class="color-dot" style="background:#F1F5F9"></div>
    <div class="color-dot" style="background:#1E293B"></div>
  </div>

  <a class="open-btn" id="openBtn" href="#">Already have FlashQuest? Open App</a>

  <a class="download-btn" href="https://apps.apple.com/app/flashquest-ai-flashcards/id6760952587" id="downloadBtn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 1 0 0-20z"/><path d="m9 12 2 2 4-4"/></svg>
    Download FlashQuest (Free)
  </a>

  <p class="hint">After downloading, enter code <strong id="codeHint">...</strong> during sign up or in Settings → Invite Friends.</p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const code = (params.get('code') || '').trim();

if (code) {
  document.getElementById('title').textContent = code + ' invited you!';
  document.getElementById('subtitle').textContent = 'Join FlashQuest and you both unlock 6 exclusive avatar colors.';
  document.getElementById('codeDisplay').textContent = code;
  document.getElementById('codeHint').textContent = code;
  document.getElementById('openBtn').href = 'flashquest://r/' + encodeURIComponent(code);

  // Update OG dynamically (won't affect crawlers but helps with copy-paste)
  document.title = code + ' invited you to FlashQuest!';
} else {
  document.getElementById('title').textContent = 'Join FlashQuest';
  document.getElementById('subtitle').textContent = 'The flashcard app with AI deck creation, spaced repetition, and real-time multiplayer battles.';
  document.getElementById('codeDisplay').parentElement.style.display = 'none';
  document.querySelector('.code-label').style.display = 'none';
  document.querySelector('.colors-row').style.display = 'none';
  document.getElementById('codeHint').parentElement.style.display = 'none';
  document.getElementById('openBtn').style.display = 'none';
}

function copyCode() {
  if (!code) return;
  navigator.clipboard.writeText(code).then(function() {
    var btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(function() {});
}
</script>
</body>
</html>
