<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Battle - FlashQuest</title>
<meta name="description" content="Join a FlashQuest Arena battle room.">
<meta name="theme-color" content="#08071A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'DM Sans',-apple-system,sans-serif;
  background:#08071A;color:#EEEDF5;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;text-align:center;
  -webkit-font-smoothing:antialiased;
  position:relative;overflow:hidden;
}
h1,h2,h3{font-family:'Outfit',sans-serif;letter-spacing:-.02em}
body::before{
  content:'';position:absolute;top:-150px;left:50%;transform:translateX(-50%);
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,#F59E0B15,transparent 70%);
  pointer-events:none;
}
body::after{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.4;pointer-events:none;
}
.join-card{
  max-width:400px;width:100%;
  background:rgba(20,19,46,.7);border:1px solid #2A2850;
  border-radius:24px;padding:48px 36px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  position:relative;z-index:1;
  animation:cardIn .6s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.join-icon{font-size:48px;margin-bottom:18px;display:block}
.join-title{font-size:1.8rem;font-weight:800;margin-bottom:8px}
.join-sub{font-size:.93rem;color:#A09CB5;margin-bottom:28px;line-height:1.6}
.room-code{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#F59E0B,#F97316);
  color:#fff;font-family:'Outfit',sans-serif;
  font-size:2rem;font-weight:900;letter-spacing:6px;
  padding:16px 36px;border-radius:16px;margin-bottom:28px;
  box-shadow:0 8px 32px #F59E0B30;
  animation:codePulse 3s ease infinite;
}
@keyframes codePulse{0%,100%{box-shadow:0 8px 32px #F59E0B30}50%{box-shadow:0 8px 40px #F59E0B50}}
.steps{text-align:left;margin-bottom:32px}
.step{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.step:last-child{margin-bottom:0}
.step-n{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:rgba(245,158,11,.15);color:#FBBF24;
  font-size:.78rem;font-weight:800;
  display:grid;place-items:center;
}
.step-t{font-size:.9rem;color:#A09CB5;line-height:1.5;padding-top:3px}
.step-t strong{color:#EEEDF5}
.join-cta{
  display:flex;align-items:center;justify-content:center;
  width:100%;height:52px;
  background:linear-gradient(135deg,#F59E0B,#F97316);
  color:#fff;font-family:'Outfit',sans-serif;
  font-size:1rem;font-weight:700;border-radius:14px;
  text-decoration:none;border:none;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
}
.join-cta:hover{transform:translateY(-2px);box-shadow:0 8px 28px #F59E0B40}
.join-footer{
  margin-top:24px;font-size:.82rem;color:#6B6889;
  position:relative;z-index:1;
  animation:cardIn .6s .15s cubic-bezier(.22,1,.36,1) both;
}
.join-footer a{color:#A78BFA;font-weight:600}
.join-footer a:hover{color:#C4B5FD}
.no-code{color:#A09CB5;font-size:.9rem}
</style>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
</head>
<body>

<div class="join-card" id="joinCard">
  <span class="join-icon">&#x2694;&#xFE0F;</span>
  <h1 class="join-title">Join Battle</h1>
  <p class="join-sub">You've been invited to a FlashQuest Arena battle!</p>

  <div class="room-code" id="roomCode"></div>

  <div class="steps">
    <div class="step">
      <div class="step-n">1</div>
      <div class="step-t">Open <strong>FlashQuest</strong> on your phone</div>
    </div>
    <div class="step">
      <div class="step-n">2</div>
      <div class="step-t">Tap <strong>Arena</strong>, then <strong>Join Battle</strong></div>
    </div>
    <div class="step">
      <div class="step-n">3</div>
      <div class="step-t">Enter the room code above</div>
    </div>
  </div>

  <a href="#" class="join-cta" id="openApp">Open FlashQuest</a>
</div>

<p class="join-footer">
  Don't have the app? <a href="/">Download FlashQuest</a>
</p>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');

  if (!code) {
    var path = window.location.pathname;
    var match = path.match(/\/join\/?([A-Za-z0-9]+)/);
    if (match) code = match[1];
  }

  var codeEl = document.getElementById('roomCode');
  var ctaEl = document.getElementById('openApp');

  if (code) {
    code = code.toUpperCase().slice(0, 8);
    codeEl.textContent = code;
    var deepLink = 'flashquest://arena/join?code=' + code;
    ctaEl.href = deepLink;

    setTimeout(function() {
      window.location.href = deepLink;
    }, 300);
  } else {
    codeEl.textContent = '----';
    ctaEl.style.display = 'none';
    var sub = document.querySelector('.join-sub');
    if (sub) sub.textContent = 'No room code found. Ask your friend to share their battle link again.';
  }
})();
</script>
</body>
</html>
